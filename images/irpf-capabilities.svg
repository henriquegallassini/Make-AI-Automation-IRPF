<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="640" viewBox="0 0 1600 640">
<defs><filter id="s"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-opacity="0.15"/></filter></defs>
<rect width="1600" height="640" rx="32" fill="#eef3f9"/>
<text x="800" y="70" text-anchor="middle" font-family="Arial" font-size="36" font-weight="700" fill="#14213d">Capacidades da automação</text><text x="800" y="108" text-anchor="middle" font-family="Arial" font-size="17" fill="#5f6b7a">Um fluxo completo de processamento, controle e comunicação</text>
<g filter="url(#s)" fill="#fff"><rect x="95" y="165" width="420" height="165" rx="22"/><rect x="590" y="165" width="420" height="165" rx="22"/><rect x="1085" y="165" width="420" height="165" rx="22"/><rect x="340" y="380" width="420" height="165" rx="22"/><rect x="840" y="380" width="420" height="165" rx="22"/></g>
<g font-family="Arial"><text x="130" y="215" font-size="24" font-weight="700" fill="#6d00cc">01 • Entrada automatizada</text><text x="130" y="255" font-size="17" fill="#596579">Monitoramento de arquivos no Google Drive</text><text x="130" y="285" font-size="15" fill="#7b8798">Recebimento, download e movimentação</text><text x="625" y="215" font-size="24" font-weight="700" fill="#4285f4">02 • Extração com IA</text><text x="625" y="255" font-size="17" fill="#596579">Interpretação dos dados da declaração</text><text x="625" y="285" font-size="15" fill="#7b8798">Saída estruturada para o processo</text><text x="1120" y="215" font-size="24" font-weight="700" fill="#1f9d68">03 • Persistência</text><text x="1120" y="255" font-size="17" fill="#596579">Registro no Supabase e PostgreSQL</text><text x="1120" y="285" font-size="15" fill="#7b8798">Pessoas, exercícios, uploads e documentos</text><text x="375" y="430" font-size="24" font-weight="700" fill="#e08900">04 • Gestão de pendências</text><text x="375" y="470" font-size="17" fill="#596579">Identificação dos documentos ausentes</text><text x="375" y="500" font-size="15" fill="#7b8798">Controle por contribuinte e exercício</text><text x="875" y="430" font-size="24" font-weight="700" fill="#d64b3f">05 • Comunicação automática</text><text x="875" y="470" font-size="17" fill="#596579">Redação personalizada e envio por e-mail</text><text x="875" y="500" font-size="15" fill="#7b8798">OpenAI + Gmail</text></g>
</svg>